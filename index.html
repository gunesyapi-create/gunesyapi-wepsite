<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Güneş Yapı | Boya • Tadilat • İnşaat</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: linear-gradient(145deg, #fff8f0 0%, #ffe8d4 100%);
            background-attachment: fixed;
            color: #1e2a3a;
            position: relative;
            line-height: 1.5;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 15% 30%, rgba(230, 126, 34, 0.04) 2px, transparent 2px),
                radial-gradient(circle at 75% 65%, rgba(243, 156, 18, 0.04) 1.5px, transparent 1.5px);
            background-size: 50px 50px, 35px 35px;
            pointer-events: none;
            z-index: 0;
        }
        .wrapper { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; }
        header {
            background: linear-gradient(135deg, #1e2a3a 0%, #2c3e50 100%);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            border-bottom: 3px solid #e67e22;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo { width: 55px; height: 55px; border-radius: 12px; background: white; padding: 5px; box-shadow: 0 5px 15px rgba(230,126,34,0.3); transition: all 0.3s; }
        .logo:hover { transform: rotate(-3deg) scale(1.05); }
        .brand h1 { color: white; font-size: 28px; font-weight: 700; letter-spacing: 1px; }
        .brand p { color: #e67e22; font-size: 12px; font-weight: 500; letter-spacing: 2px; }
        .header-contact { display: flex; gap: 8px; flex-wrap: nowrap; }
        .header-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(999,999,999,0.9);
            transition: all 0.3s;
            white-space: nowrap;
        }
        .header-btn i { font-size: 16px; color: #e67e22; }
        .header-btn:hover { background: #e67e22; color: white; border-color: #e67e22; transform: translateY(-2px); }
        .header-btn:hover i { color: white; }
        .hero {
            margin: 25px 20px;
            padding: 60px 30px;
            background: linear-gradient(135deg, #e67e22 0%, #f39c12 50%, #e67e22 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
            border-radius: 35px;
            color: white;
            text-align: center;
            box-shadow: 0 25px 40px rgba(230,126,34,0.25);
            position: relative;
            overflow: hidden;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hero::before {
            content: "Y";
            font-size: 180px;
            position: absolute;
            left: -30px;
            bottom: -50px;
            opacity: 0.1;
            transform: rotate(-15deg);
        }
