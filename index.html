<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güneş Yapı | Ana Sayfa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            color: #2c3e50;
        }
        header {
            background: #2c3e50;
            padding: 20px;
            text-align: center;
            color: white;
        }
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .logo {
            width: 55px;
            height: auto;
            border-radius: 12px;
            background: white;
            padding: 5px;
        }
        .site-title h1 {
            font-size: 28px;
        }
        .site-title p {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 5px;
        }
        nav {
            background: #e67e22;
            padding: 12px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            margin: 0 5px;
            display: inline-block;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }
        nav a:hover {
            background: #d35400;
        }
        .hero {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(135deg, #e67e22, #f39c12);
            color: white;
        }
        .hero h2 {
            font-size: 42px;
            margin-bottom: 20px;
        }
        .hero .slogan {
            font-size: 20px;
            font-style: italic;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        .hero button {
            background: white;
            color: #e67e22;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .hero button:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
        @media (max-width: 768px) {
            nav a {
                display: block;
                margin: 8px;
            }
            .hero h2 {
                font-size: 28px;
            }
            .hero .slogan {
                font-size: 16px;
            }
            .logo {
                width: 40px;
            }
            .site-title h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="abc.jpeg" alt="Logo" class="logo" onerror="this.style.display='none'">
            <div class="site-title">
                <h1>GÜNEŞ YAPI</h1>
                <p>Yapı & İnşaat</p>
            </div>
        </div>
    </header>
    
    <nav>
        <a href="index.html">Ana Sayfa</a>
        <a href="hizmetler.html">Hizmetler</a>
        <a href="projeler.html">Projeler</a>
        <a href="iletisim.html">İletişim</a>
    </nav>
    
    <div class="hero">
        <h2>Hayalinizdeki Yapıya Ulaşın</h2>
        <div class="slogan">"Ramazan Bayramınız Mübarek Olsun."</div>
        <button onclick="window.location.href='tel:05359859535'">Hemen Teklif Al</button>
    </div>
    
    <footer>
        <p>&copy; 2026 Güneş Yapı | Yapı & İnşaat | Telefon: 0535 985 95 35</p>
    </footer>
</body>
</html>
