<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIDAY | Ana Sistem Karargahı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-dark: #050914;
            --glass-bg: rgba(10, 20, 40, 0.4);
            --glass-border: rgba(0, 243, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* Arka Plan */
        .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.4; z-index: -1; animation: float 12s infinite alternate ease-in-out; }
        .orb-1 { width: 500px; height: 500px; background: var(--neon-blue); top: -150px; left: -150px; }
        .orb-2 { width: 400px; height: 400px; background: var(--neon-purple); bottom: -100px; right: -100px; animation-delay: -6s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 60px) scale(1.2); } }

        /* Nav */
        nav { position: fixed; top: 0; width: 100%; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(5, 9, 20, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); z-index: 100; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--neon-blue); }
        .nav-links { list-style: none; display: flex; gap: 20px; }
        .nav-links a { color: #fff; text-decoration: none; font-weight: 600; text-transform: uppercase; }

        section { min-height: 100vh; padding: 120px 5%; display: flex; flex-direction: column; align-items: center; }
        .section-title { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--neon-purple); margin-bottom: 40px; }

        /* Kart ve Formlar */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; }
        .card { background: var(--glass-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--glass-border); text-align: center; }
        
        .contact-container { width: 100%; max-width: 600px; background: var(--glass-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--glass-border); }
        input, textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #444; color: #fff; padding: 15px; margin-bottom: 15px; outline: none; }
        .cyber-btn { background: transparent; color: var(--neon-blue); padding: 15px 30px; border: 2px solid var(--neon-blue); border-radius: 50px; cursor: pointer; text-transform: uppercase; }
        .cyber-btn:hover { background: var(--neon-blue); color: #000; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav>
        <div class="logo">FRIDAY <i class="fa-solid fa-microchip"></i></div>
        <ul class="nav-links">
            <li><a href="#home">Ana Panel</a></li>
            <li><a href="#hizmetler">Hizmetler</a></li>
            <li><a href="#galeri">Galeri</a></li>
            <li><a href="#iletisim">İletişim</a></li>
        </ul>
    </nav>

    <section id="home">
        <h1 style="font-size: 3rem; color: var(--neon-blue); margin-bottom: 20px;">OPERASYONEL MERKEZ</h1>
        <p>Sistem çevrimiçi. Tüm veriler senkronize edildi.</p>
    </section>

    <section id="hizmetler">
        <h2 class="section-title">Hizmetler</h2>
        <div class="grid">
            <div class="card"><i class="fa-solid fa-code" style="font-size: 3rem; color: var(--neon-blue);"></i><h3>Web Tasarım</h3></div>
            <div class="card"><i class="fa-solid fa-server" style="font-size: 3rem; color: var(--neon-blue);"></i><h3>Sistem Mimari</h3></div>
            <div class="card"><i class="fa-solid fa-shield-halved" style="font-size: 3rem; color: var(--neon-blue);"></i><h3>Güvenlik</h3></div>
        </div>
    </section>

    <section id="galeri">
        <h2 class="section-title">Eski Çalışmalar</h2>
        <div class="grid">
            <div class="card" style="height: 200px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05);">Proje Dosyası A</div>
            <div class="card" style="height: 200px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05);">Proje Dosyası B</div>
            <div class="card" style="height: 200px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05);">Proje Dosyası C</div>
        </div>
    </section>

    <section id="iletisim">
        <h2 class="section-title">İletişim & Sizi Arayalım</h2>
        <div class="contact-container">
            <input type="text" placeholder="İsim Soyisim">
            <input type="tel" placeholder="Telefon Numarası (Sizi Arayalım)">
            <textarea placeholder="Mesajınız veya Talep Detayı"></textarea>
            <button class="cyber-btn" onclick="alert('Talep alındı! En kısa sürede geri dönüş yapılacak.')">Sinyali Gönder</button>
        </div>
    </section>

</body>
</html>
