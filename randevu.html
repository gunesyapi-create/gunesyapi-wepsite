<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güneş Yapı | Randevu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff5e8, #ffdec2);
            color: #2c3e50;
        }
        header {
            background: #2c3e50;
            padding: 20px;
            text-align: center;
            color: white;
        }
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .logo {
            width: 50px;
            height: auto;
            border-radius: 12px;
            background: white;
            padding: 5px;
        }
        .site-title h1 {
            font-size: 28px;
        }
        .site-title p {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 5px;
        }
        nav {
            background: #e67e22;
            padding: 12px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            margin: 0 2px;
            display: inline-block;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }
        nav a:hover {
            background: #d35400;
        }
        .container {
            max-width: 550px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .form-card h2 {
            text-align: center;
            color: #e67e22;
            margin-bottom: 25px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #2c3e50;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #e67e22;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .btn-whatsapp {
            flex: 1;
            background: #25D366;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .btn-whatsapp:hover {
            background: #128C7E;
        }
        .btn-mail {
            flex: 1;
            background: #e67e22;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .btn-mail:hover {
            background: #d35400;
        }
        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .success-message {
            text-align: center;
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
        @media (max-width: 768px) {
            nav a {
                display: block;
                margin: 8px;
            }
            .logo {
                width: 40px;
            }
            .site-title h1 {
                font-size: 22px;
            }
            .btn-group {
                flex-direction: column;
            }
            .form-card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="abc.jpeg" alt="Logo" class="logo" onerror="this.style.display='none'">
            <div class="site-title">
                <h1>GÜNEŞ YAPI</h1>
                <p>Yapı & İnşaat</p>
            </div>
        </div>
    </header>
    
    <nav>
        <a href="index.html">Ana Sayfa</a>
        <a href="hizmetler.html">Hizmetler</a>
        <a href="projeler.html">Projeler</a>
        <a href="indirimler.html">İndirimler</a>
        <a href="randevu.html">Randevu</a>
        <a href="iletisim.html">İletişim</a>
    </nav>
    
    <div class="container">
        <div class="form-card">
            <h2>📅 Randevu Formu</h2>
            <form id="randevuForm">
                <div class="form-group">
                    <label>👤 Ad Soyad *</label>
                    <input type="text" id="adsoyad" required placeholder="Mehmet Güneş">
                </div>
                <div class="form-group">
                    <label>📞 Telefon *</label>
                    <input type="tel" id="telefon" required placeholder="0535 985 95 35">
                </div>
                <div class="form-group">
                    <label>📍 Konum / İlçe *</label>
                    <input type="text" id="konum" required placeholder="Gebze, İstanbul, Kocaeli...">
                </div>
                <div class="form-group">
                    <label>📅 Randevu Tarihi *</label>
                    <input type="date" id="tarih" required>
                </div>
                <div class="form-group">
                    <label>🔧 Hizmet Seçimi *</label>
                    <select id="hizmet" required>
                        <option value="">Seçiniz...</option>
                        <option value="Boya & Badana">Boya & Badana</option>
                        <option value="Alçı & Alçıpan">Alçı & Alçıpan</option>
                        <option value="Fayans & Seramik">Fayans & Seramik</option>
                        <option value="Tadilat & Yenileme">Tadilat & Yenileme</option>
                        <option value="Dekorasyon">Dekorasyon</option>
                        <option value="Su Yalıtımı">Su Yalıtımı</option>
                        <option value="Isı Yalıtımı">Isı Yalıtımı</option>
                        <option value="Diğer">Diğer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📝 Eklemek İstedikleriniz</label>
                    <textarea id="mesaj" rows="3" placeholder="Adres detayı veya notunuz..."></textarea>
                </div>
                
                <div class="btn-group">
                    <button type="button" class="btn-whatsapp" onclick="sendWhatsApp()">📱 WhatsApp ile Gönder</button>
                    <button type="button" class="btn-mail" onclick="sendEmail()">📧 E-posta ile Gönder</button>
                </div>
                <div id="successMessage" class="success-message">
                    ✅ Randevu talebiniz iletildi! En kısa sürede size dönüş yapacağız.
                </div>
                <div class="info-text">
                    WhatsApp veya E-posta ile randevu talebiniz bize iletilecektir.
                </div>
            </form>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2026 Güneş Yapı | Yapı & İnşaat | Telefon: 0535 985 95 35</p>
    </footer>
    
    <script>
        function getFormData() {
            var adsoyad = document.getElementById('adsoyad').value;
            var telefon = document.getElementById('telefon').value;
            var konum = document.getElementById('konum').value;
            var tarih = document.getElementById('tarih').value;
            var hizmet = document.getElementById('hizmet').value;
            var mesaj = document.getElementById('mesaj').value;
            
            if (!adsoyad || !telefon || !konum || !tarih || !hizmet) {
                alert("Lütfen tüm zorunlu alanları doldurun!\n(Ad Soyad, Telefon, Konum, Tarih, Hizmet)");
                return null;
            }
            
            var mesajText = mesaj ? mesaj : "Belirtilmemiş";
            
            return {
                adsoyad: adsoyad,
                telefon: telefon,
                konum: konum,
                tarih: tarih,
                hizmet: hizmet,
                mesaj: mesajText
            };
        }
        
        function formatMessage(data) {
            return "📅 YENİ RANDEVU TALEBİ 📅%0A%0A" +
                   "👤 Ad Soyad: " + data.adsoyad + "%0A" +
                   "📞 Telefon: " + data.telefon + "%0A" +
                   "📍 Konum: " + data.konum + "%0A" +
                   "📅 Tarih: " + data.tarih + "%0A" +
                   "🔧 Hizmet: " + data.hizmet + "%0A" +
                   "📝 Ek Not: " + data.mesaj + "%0A%0A" +
                   "Güneş Yapı - Randevu Talebi";
        }
        
        function sendWhatsApp() {
            var data = getFormData();
            if (!data) return;
            
            var message = formatMessage(data);
            var url = "https://wa.me/905359859535?text=" + message;
            window.open(url, "_blank");
            
            document.getElementById('successMessage').style.display = 'block';
            setTimeout(function() {
                document.getElementById('successMessage').style.display = 'none';
            }, 5000);
            document.getElementById('randevuForm').reset();
        }
        
        function sendEmail() {
            var data = getFormData();
            if (!data) return;
            
            var subject = "Yeni Randevu Talebi - " + data.adsoyad + " (" + data.hizmet + ")";
            var body = "Ad Soyad: " + data.adsoyad + "\n" +
                       "Telefon: " + data.telefon + "\n" +
                       "Konum: " + data.konum + "\n" +
                       "Tarih: " + data.tarih + "\n" +
                       "Hizmet: " + data.hizmet + "\n" +
                       "Ek Not: " + data.mesaj + "\n\n" +
                       "Güneş Yapı - Randevu Talebi";
            
            var url = "mailto:info@gunesyapi.com?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
            window.location.href = url;
            
            document.getElementById('successMessage').style.display = 'block';
            setTimeout(function() {
                document.getElementById('successMessage').style.display = 'none';
            }, 5000);
            document.getElementById('randevuForm').reset();
        }
    </script>
</body>
</html>
