<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güneş Yapı | İletişim</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            color: #2c3e50;
        }
        header {
            background: #2c3e50;
            padding: 20px;
            text-align: center;
            color: white;
        }
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .logo {
            width: 55px;
            height: auto;
            border-radius: 12px;
            background: white;
            padding: 5px;
        }
        .site-title h1 {
            font-size: 28px;
        }
        .site-title p {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 5px;
        }
        nav {
            background: #e67e22;
            padding: 12px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            margin: 0 5px;
            display: inline-block;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }
        nav a:hover {
            background: #d35400;
        }
        .container {
            max-width: 800px;
            margin: 80px auto;
            padding: 20px;
        }
        .contact-card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .contact-card h2 {
            color: #e67e22;
            margin-bottom: 30px;
            font-size: 32px;
        }
        .contact-item {
            margin: 30px 0;
        }
        .contact-item p {
            font-size: 20px;
            margin: 10px 0;
        }
        .contact-item a {
            color: #2c3e50;
            text-decoration: none;
        }
        .contact-item a:hover {
            color: #e67e22;
        }
        .instagram-btn {
            display: inline-block;
            background: #e67e22;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }
        .instagram-btn:hover {
            background: #d35400;
            transform: scale(1.05);
        }
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
        @media (max-width: 768px) {
            nav a {
                display: block;
                margin: 8px;
            }
            .logo {
                width: 40px;
            }
            .site-title h1 {
                font-size: 22px;
            }
            .contact-card {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="abc.jpeg" alt="Logo" class="logo" onerror="this.style.display='none'">
            <div class="site-title">
                <h1>GÜNEŞ YAPI</h1>
                <p>Yapı & İnşaat</p>
            </div>
        </div>
    </header>
    
    <nav>
        <a href="index.html">Ana Sayfa</a>
        <a href="hizmetler.html">Hizmetler</a>
        <a href="projeler.html">Projeler</a>
        <a href="iletisim.html">İletişim</a>
    </nav>
    
    <div class="container">
        <div class="contact-card">
            <h2>İletişim</h2>
            <div class="contact-item">
                <p>📞 <a href="tel:05359859535">0535 985 95 35</a></p>
                <p>📧 <a href="mailto:info@gunesyapi.com">info@gunesyapi.com</a></p>
                <p>📍 İstanbul & Kocaeli</p>
            </div>
            <a href="https://instagram.com/gunesyapi954" target="_blank" class="instagram-btn">📷 Bizi Instagram'da Takip Edin</a>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2026 Güneş Yapı | Yapı & İnşaat | Telefon: 0535 985 95 35</p>
    </footer>
</body>
</html>
